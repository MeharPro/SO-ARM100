<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #f7f8f5; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .battery { fill: #fff7ed; stroke: #c2410c; stroke-width: 3; }
      .protection { fill: #ecfdf5; stroke: #047857; stroke-width: 3; }
      .controller { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 3; }
      .load { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
      .software { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 3; }
      .note { fill: #fffbeb; stroke: #b45309; stroke-width: 2; }
      .wire { fill: none; stroke: #111827; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .control { fill: none; stroke: #6d28d9; stroke-width: 4; stroke-dasharray: 12 10; stroke-linecap: round; stroke-linejoin: round; }
      .ground { fill: none; stroke: #64748b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 38px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #374151; }
      .h2 { font-size: 23px; font-weight: 700; }
      .body { font-size: 18px; }
      .small { font-size: 15px; fill: #374151; }
      .tiny { font-size: 13px; fill: #4b5563; }
      .ok { fill: #047857; font-weight: 700; }
      .warn { fill: #b45309; font-weight: 700; }
      .wirelabel { font-size: 16px; font-weight: 700; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#111827" />
    </marker>
    <marker id="purpleArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#6d28d9" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000" />

  <text x="70" y="70" class="label title">Robot Power Compliance Wiring</text>
  <text x="70" y="105" class="label subtitle">Ontario Skills 2026 inspection sheet: hardware protection first, virtual fuse as backup evidence</text>

  <rect x="70" y="135" width="1460" height="90" rx="10" class="note" />
  <text x="95" y="168" class="label h2">Rule checklist shown by this diagram</text>
  <text x="95" y="198" class="label body">Voltage per circuit: 12V battery branch and VEX 12.8V system are below 24V.  Power branch: CITYORK output is listed at 1-3A max, below 256W.</text>

  <!-- CITYORK / Pi side -->
  <rect x="70" y="265" width="700" height="590" rx="14" class="panel" />
  <text x="100" y="305" class="label h2">Battery Branch A: CITYORK battery to Pi / robot electronics</text>

  <rect x="105" y="345" width="245" height="155" rx="12" class="battery" />
  <text x="125" y="378" class="label h2">CITYORK 12V Pack</text>
  <text x="125" y="410" class="label body">Commercial sealed pack</text>
  <text x="125" y="438" class="label body">7900mAh / 99.54Wh</text>
  <text x="125" y="466" class="label body">Output: 9-12V, 1-3A max</text>

  <rect x="425" y="345" width="270" height="155" rx="12" class="protection" />
  <text x="445" y="378" class="label h2">Built-in Protection</text>
  <text x="445" y="410" class="label body">Protection circuit board</text>
  <text x="445" y="438" class="label body">Over-charge / over-discharge</text>
  <text x="445" y="466" class="label body">Over-voltage / short-circuit</text>

  <path d="M 350 423 L 425 423" class="wire" marker-end="url(#arrow)" />
  <text x="362" y="407" class="label wirelabel">12V output</text>

  <rect x="155" y="570" width="240" height="130" rx="12" class="load" />
  <text x="175" y="603" class="label h2">12V to 5V USB-C</text>
  <text x="175" y="635" class="label body">DC-DC converter / cable</text>
  <text x="175" y="663" class="label body">Feeds Pi power input</text>

  <rect x="475" y="570" width="240" height="130" rx="12" class="controller" />
  <text x="495" y="603" class="label h2">Raspberry Pi 5</text>
  <text x="495" y="635" class="label body">Powered through USB-C</text>
  <text x="495" y="663" class="label body">Protected input path</text>

  <path d="M 560 500 L 560 530 L 275 530 L 275 570" class="wire" marker-end="url(#arrow)" />
  <text x="318" y="520" class="label wirelabel">protected battery output</text>
  <path d="M 395 635 L 475 635" class="wire" marker-end="url(#arrow)" />
  <text x="408" y="620" class="label wirelabel">5V USB-C</text>

  <rect x="155" y="745" width="240" height="70" rx="12" class="load" />
  <text x="175" y="775" class="label h2">Robot Controllers</text>
  <text x="175" y="800" class="label body">USB / serial control only</text>

  <rect x="475" y="745" width="240" height="70" rx="12" class="software" />
  <text x="495" y="775" class="label h2">Virtual Fuse Backup</text>
  <text x="495" y="800" class="label body">Current/temp telemetry latch</text>

  <path d="M 595 700 L 595 745" class="control" marker-end="url(#purpleArrow)" />
  <path d="M 475 780 L 395 780" class="control" marker-end="url(#purpleArrow)" />
  <text x="435" y="735" class="label small">software limits, torque-off, stop</text>

  <!-- VEX side -->
  <rect x="830" y="265" width="700" height="590" rx="14" class="panel" />
  <text x="860" y="305" class="label h2">Battery Branch B: VEX base power system</text>

  <rect x="865" y="345" width="245" height="155" rx="12" class="battery" />
  <text x="885" y="378" class="label h2">VEX V5 Battery</text>
  <text x="885" y="410" class="label body">Commercial VEX pack</text>
  <text x="885" y="438" class="label body">12.8V nominal system</text>
  <text x="885" y="466" class="label body">Known documented platform</text>

  <rect x="1185" y="345" width="270" height="155" rx="12" class="protection" />
  <text x="1205" y="378" class="label h2">VEX V5 Brain</text>
  <text x="1205" y="410" class="label body">Known protected system</text>
  <text x="1205" y="438" class="label body">Smart ports and V5 telemetry</text>
  <text x="1205" y="466" class="label body">Battery current is monitored</text>

  <path d="M 1110 423 L 1185 423" class="wire" marker-end="url(#arrow)" />
  <text x="1124" y="407" class="label wirelabel">VEX battery cable</text>

  <rect x="925" y="570" width="240" height="130" rx="12" class="load" />
  <text x="945" y="603" class="label h2">VEX Smart Motors</text>
  <text x="945" y="635" class="label body">Powered via V5 Brain</text>
  <text x="945" y="663" class="label body">No raw battery branch</text>

  <rect x="1245" y="570" width="240" height="130" rx="12" class="controller" />
  <text x="1265" y="603" class="label h2">Pi to VEX Link</text>
  <text x="1265" y="635" class="label body">USB serial commands</text>
  <text x="1265" y="663" class="label body">No power from Pi to motors</text>

  <path d="M 1320 500 L 1320 530 L 1045 530 L 1045 570" class="wire" marker-end="url(#arrow)" />
  <text x="1084" y="520" class="label wirelabel">protected VEX smart-port power</text>
  <path d="M 1245 635 L 1165 635" class="control" marker-end="url(#purpleArrow)" />
  <text x="1182" y="620" class="label small">control only</text>

  <rect x="925" y="745" width="560" height="70" rx="12" class="software" />
  <text x="945" y="775" class="label h2">VEX + Pi software backup</text>
  <text x="945" y="800" class="label body">Controller mode, replay stop, emergency shutdown instructions, and virtual fuse telemetry support hardware protection.</text>

  <!-- Bottom inspection notes -->
  <rect x="70" y="890" width="1460" height="70" rx="10" class="note" />
  <text x="95" y="918" class="label h2">Inspection statement</text>
  <text x="95" y="947" class="label body">Every battery-fed branch lands first in either documented built-in protection or the known VEX V5 protected system. Any added raw external branch must get its own inline fuse.</text>
</svg>
